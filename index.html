<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vocab Cards</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg:       #F3F5F9;
      --surface:  #FFFFFF;
      --surface2: #ECEEF5;
      --border:   #D4D8E8;
      --text:     #1B1F2E;
      --muted:    #6B7291;
      --primary:  #1B6B72;
      --pri-mid:  #22878F;
      --pri-lite: #E2F2F4;
      --star:     #F5A623;
      --ok:       #1A7A52;
      --ok-bg:    #EAFAF2;
      --err:      #C93434;
      --err-bg:   #FEF0F0;
      --r:  14px;
      --rs:  9px;
      --sh:  0 2px 10px rgba(0,0,0,.07);
      --shl: 0 6px 24px rgba(0,0,0,.11);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ── Shell ──────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Header ─────────────────────────── */
    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      padding-top: max(12px, env(safe-area-inset-top));
      position: sticky; top: 0; z-index: 50;
    }
    .hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .brand { font-size: 17px; font-weight: 800; color: var(--primary); letter-spacing: -.3px; }

    .dtog { display: flex; background: var(--surface2); border-radius: 20px; padding: 3px; gap: 2px; }
    .dtog button {
      border: none; background: transparent; padding: 5px 12px; border-radius: 18px;
      font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted);
      transition: all .2s; white-space: nowrap;
    }
    .dtog button.on { background: var(--primary); color: #fff; }
    .badge {
      display: inline-block; background: var(--star); color: #fff;
      font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: 4px;
    }

    .tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tabs button {
      border: none; background: none; padding: 5px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted);
      white-space: nowrap; transition: all .18s;
    }
    .tabs button.on { background: var(--pri-lite); color: var(--primary); font-weight: 700; }

    /* ── Content ────────────────────────── */
    .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .view { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
    .view.on { display: block; }

    .empty { text-align: center; padding: 56px 16px; color: var(--muted); }
    .empty .ico { font-size: 44px; margin-bottom: 12px; }
    .empty p { font-size: 15px; line-height: 1.6; }

    /* ── Browse ─────────────────────────── */
    .search {
      width: 100%; padding: 10px 16px; border: 1.5px solid var(--border);
      border-radius: 24px; font-size: 15px; background: var(--surface);
      outline: none; margin-bottom: 12px; transition: border-color .2s;
    }
    .search:focus { border-color: var(--primary); }

    .pills { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
    .pills::-webkit-scrollbar { display: none; }
    .pill {
      border: 1.5px solid var(--border); background: var(--surface);
      padding: 4px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; color: var(--muted); transition: all .18s;
    }
    .pill.on { border-color: var(--primary); background: var(--pri-lite); color: var(--primary); }

    .blist { display: flex; flex-direction: column; gap: 8px; }
    .bcard {
      background: var(--surface); border-radius: var(--r); padding: 13px 14px 13px 18px;
      display: flex; align-items: flex-start; gap: 10px; border-left: 4px solid #bbb;
      box-shadow: var(--sh); cursor: pointer; transition: box-shadow .2s;
    }
    .bcard:hover { box-shadow: var(--shl); }
    .bcard-body { flex: 1; min-width: 0; }
    .bterm { font-size: 15px; font-weight: 700; }
    .bdef { font-size: 13px; color: var(--muted); margin-top: 5px; line-height: 1.5; display: none; }
    .bex  { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 3px; display: none; }
    .bcard.open .bdef, .bcard.open .bex { display: block; }
    .btag {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 10px; margin-top: 5px;
    }
    .star {
      background: none; border: none; font-size: 22px; cursor: pointer;
      padding: 0 2px; color: #ccc; transition: color .2s, transform .12s; flex-shrink: 0;
    }
    .star:active { transform: scale(.82); }
    .star.on { color: var(--star); }

    /* ── Card 3D ────────────────────────── */
    .fc-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .fc-meta { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .fc-ctr  { font-size: 13px; color: var(--muted); font-weight: 600; }

    .c3d { perspective: 1000px; width: 100%; max-width: 420px; height: 260px; cursor: pointer; user-select: none; }
    .c3d-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .c3d.flipped .c3d-inner { transform: rotateY(180deg); }

    .cface {
      position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: var(--r);
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; padding: 28px 24px; text-align: center;
    }
    .cface.front {
      background: var(--surface); box-shadow: var(--shl); border: 1px solid var(--border);
    }
    /* Signature element: notebook paper ruled lines on card back */
    .cface.back {
      transform: rotateY(180deg);
      background-color: #FAFCFF;
      background-image: repeating-linear-gradient(
        transparent, transparent 27px,
        #C8DBE8 27px, #C8DBE8 28px
      );
      border: 1px solid #B8CDD8;
      box-shadow: var(--shl);
    }

    .cterm { font-size: 34px; font-weight: 800; color: var(--primary); letter-spacing: -.5px; line-height: 1.1; }
    .chint { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 14px; }
    .cdef  { font-size: 18px; font-weight: 500; color: var(--text); line-height: 1.45; position: relative; z-index: 1; }
    .cex   { font-size: 13px; font-style: italic; color: var(--muted); margin-top: 12px; line-height: 1.5; position: relative; z-index: 1; }

    .fc-nav { display: flex; gap: 10px; align-items: center; }

    .btn {
      border: none; cursor: pointer; font-weight: 600;
      transition: all .18s; border-radius: var(--rs); font-size: 14px;
    }
    .btn-ghost {
      background: var(--surface); border: 1.5px solid var(--border);
      color: var(--text); padding: 9px 16px;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    .btn-pri { background: var(--primary); color: #fff; padding: 10px 22px; }
    .btn-pri:hover { background: var(--pri-mid); }
    .btn-star {
      background: var(--surface); border: 1.5px solid var(--border);
      color: var(--muted); padding: 9px 18px;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-star.on { border-color: var(--star); color: var(--star); background: #FEF8ED; }

    /* ── Learn ──────────────────────────── */
    .prog { height: 5px; background: var(--surface2); border-radius: 3px; margin-bottom: 18px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s ease; }

    .defcard {
      background: var(--surface); border-radius: var(--r); padding: 24px;
      text-align: center; border: 1px solid var(--border); box-shadow: var(--sh); margin-bottom: 18px;
    }
    .deflabel { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .deftext  { font-size: 19px; font-weight: 500; line-height: 1.45; }
    .defex    { font-size: 13px; font-style: italic; color: var(--muted); margin-top: 10px; }

    .ainput {
      width: 100%; padding: 14px 18px; border: 2px solid var(--border);
      border-radius: var(--r); font-size: 18px; text-align: center;
      outline: none; background: var(--surface); transition: border-color .2s; margin-bottom: 12px;
    }
    .ainput:focus { border-color: var(--primary); }
    .ainput.ok  { border-color: var(--ok);  background: var(--ok-bg); }
    .ainput.bad { border-color: var(--err); background: var(--err-bg); }

    .fb { text-align: center; font-size: 15px; min-height: 22px; margin-bottom: 14px; }
    .fb.ok  { color: var(--ok); font-weight: 600; }
    .fb.bad { color: var(--err); }

    .arow { display: flex; gap: 8px; justify-content: center; }

    /* ── Match ──────────────────────────── */
    .match-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .match-lbl { font-size: 13px; font-weight: 700; color: var(--muted); }
    .match-tmr { font-size: 24px; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; }
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .mtile {
      background: var(--surface); border: 2px solid var(--border); border-radius: var(--rs);
      padding: 12px 10px; text-align: center; font-size: 13px; line-height: 1.4;
      cursor: pointer; min-height: 66px; display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .15s, opacity .3s;
      word-break: break-word;
    }
    .mtile:hover:not(.done):not(.sel) { border-color: #999; }
    .mtile.sel  { border-color: var(--primary); background: var(--pri-lite); }
    .mtile.done { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); pointer-events: none; opacity: .55; }
    .mtile.shake { animation: shake .38s; border-color: var(--err); background: var(--err-bg); }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* ── Quiz ───────────────────────────── */
    .quiz-q {
      background: var(--surface); border-radius: var(--r); padding: 26px 22px;
      text-align: center; border: 1px solid var(--border); box-shadow: var(--sh); margin-bottom: 18px;
    }
    .quiz-qlbl { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .quiz-term { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -.3px; }
    .quiz-opts { display: flex; flex-direction: column; gap: 9px; }
    .qopt {
      background: var(--surface); border: 2px solid var(--border); border-radius: var(--rs);
      padding: 13px 16px; font-size: 14px; line-height: 1.4; text-align: left; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .qopt:hover:not(.locked) { border-color: var(--primary); background: var(--pri-lite); }
    .qopt.correct { border-color: var(--ok)  !important; background: var(--ok-bg)  !important; color: var(--ok);  font-weight: 600; }
    .qopt.wrong   { border-color: var(--err) !important; background: var(--err-bg) !important; color: var(--err); }
    .qopt.locked  { cursor: default; }

    /* ── Results ────────────────────────── */
    .results { background: var(--surface); border-radius: var(--r); padding: 40px 24px; text-align: center; border: 1px solid var(--border); box-shadow: var(--sh); }
    .rscore { font-size: 56px; font-weight: 900; color: var(--primary); line-height: 1; letter-spacing: -2px; }
    .rsub   { color: var(--muted); font-size: 15px; margin: 8px 0 28px; }

    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }
    .ct   { text-align: center; }
  </style>
</head>
<body>
<div id="app">

  <header class="hdr">
    <div class="hdr-top">
      <div class="brand">📚 Vocab Cards</div>
      <div class="dtog">
        <button class="on" onclick="setFilter('all')">All</button>
        <button onclick="setFilter('mine')">★ My Deck<span class="badge" id="myBadge">0</span></button>
      </div>
    </div>
    <div class="tabs">
      <button class="on" onclick="setMode('browse')">Browse</button>
      <button onclick="setMode('flashcards')">Cards</button>
      <button onclick="setMode('learn')">Learn</button>
      <button onclick="setMode('match')">Match</button>
      <button onclick="setMode('quiz')">Quiz</button>
    </div>
  </header>

  <main class="main">
    <!-- Browse stays stable so search input keeps focus -->
    <div id="view-browse" class="view on">
      <input class="search" id="searchBox" placeholder="Search cards…" oninput="renderBrowse()">
      <div class="pills" id="catPills"></div>
      <div class="blist" id="bList"></div>
    </div>

    <!-- Other views are rebuilt each time -->
    <div id="view-flashcards" class="view"></div>
    <div id="view-learn"      class="view"></div>
    <div id="view-match"      class="view"></div>
    <div id="view-quiz"       class="view"></div>
  </main>
</div>

<script>
/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let ALL    = [];
let myDeck = new Set();
let flt    = 'all';   // 'all' | 'mine'
let mode   = 'browse';
let cat    = 'all';

// per-mode
let fc  = { order: [], idx: 0 };
let lrn = { order: [], idx: 0, answers: {}, locked: false };
let mch = { tiles: [], sel: null, done: new Set(), iv: null, secs: 0 };
let qz  = { order: [], idx: 0, answers: {}, locked: false };

/* ═══════════════════════════════
   BOOT
═══════════════════════════════ */
(function boot() {
  try { myDeck = new Set(JSON.parse(localStorage.getItem('vc_deck') || '[]')); }
  catch(_) {}

  fetch('./cards.csv')
    .then(r => r.text())
    .then(txt => {
      const { data } = Papa.parse(txt, { header: true, skipEmptyLines: true });
      ALL = data.filter(r => r.term && r.definition);
    })
    .catch(() => { ALL = sample(); })
    .finally(() => { badge(); renderBrowse(); });
})();

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
const esc = s => String(s||'')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const empty = (msg, sub='') =>
  `<div class="empty"><div class="ico">📭</div><p>${msg}</p>${sub?`<p style="margin-top:8px;font-size:13px">${sub}</p>`:''}</div>`;

// Deterministic colour per category
const CCOLORS = ['#1B6B72','#7B4FAD','#2E7D5A','#C06430','#3B5FA0','#9E3B6B'];
function catColor(name) {
  let h = 0;
  for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) & 0xFFFF;
  return CCOLORS[Math.abs(h) % CCOLORS.length];
}

// Levenshtein distance for fuzzy matching
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) =>
    Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++)
    for (let j=1;j<=n;j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

/* ═══════════════════════════════
   ROUTING
═══════════════════════════════ */
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tabs button').forEach((b,i) =>
    b.classList.toggle('on', ['browse','flashcards','learn','match','quiz'][i] === m));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById('view-' + m).classList.add('on');

  if (m === 'browse')     renderBrowse();
  if (m === 'flashcards') buildFlash();
  if (m === 'learn')      buildLearn();
  if (m === 'match')      buildMatch();
  if (m === 'quiz')       buildQuiz();
}

function setFilter(f) {
  flt = f;
  document.querySelectorAll('.dtog button').forEach((b,i) =>
    b.classList.toggle('on', (i===0&&f==='all')||(i===1&&f==='mine')));
  setMode(mode);
}

/* ═══════════════════════════════
   MY DECK
═══════════════════════════════ */
function getCards() {
  let c = flt === 'mine' ? ALL.filter((_,i) => myDeck.has(i)) : [...ALL];
  if (cat !== 'all') c = c.filter(r => (r.category||'') === cat);
  return c;
}

function toggleStar(gi) {
  myDeck.has(gi) ? myDeck.delete(gi) : myDeck.add(gi);
  localStorage.setItem('vc_deck', JSON.stringify([...myDeck]));
  badge();
  return myDeck.has(gi);
}

function badge() {
  document.getElementById('myBadge').textContent = myDeck.size;
}

/* ═══════════════════════════════
   BROWSE
═══════════════════════════════ */
function renderBrowse() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  const cats = ['all', ...new Set(ALL.map(c => c.category).filter(Boolean))];

  document.getElementById('catPills').innerHTML = cats.map(c =>
    `<button class="pill${c===cat?' on':''}" onclick="setCat('${esc(c)}')">${c==='all'?'All':esc(c)}</button>`
  ).join('');

  let cards = getCards();
  if (q) cards = cards.filter(c =>
    c.term.toLowerCase().includes(q) || c.definition.toLowerCase().includes(q));

  const list = document.getElementById('bList');
  if (!cards.length) {
    list.innerHTML = flt==='mine'
      ? empty('Your deck is empty.','Tap ☆ on any card to add it here.')
      : empty('No cards found.');
    return;
  }

  list.innerHTML = cards.map(card => {
    const gi = ALL.indexOf(card);
    const col = card.category ? catColor(card.category) : '#999';
    const on  = myDeck.has(gi);
    return `<div class="bcard" style="border-left-color:${col}" onclick="openCard(this)">
      <div class="bcard-body">
        <div class="bterm">${esc(card.term)}</div>
        <div class="bdef">${esc(card.definition)}</div>
        ${card.example ? `<div class="bex">"${esc(card.example)}"</div>` : ''}
        ${card.category ? `<span class="btag" style="background:${col}22;color:${col}">${esc(card.category)}</span>` : ''}
      </div>
      <button class="star${on?' on':''}" onclick="event.stopPropagation();bStar(${gi},this)">
        ${on?'★':'☆'}</button>
    </div>`;
  }).join('');
}

function setCat(c)       { cat = c; renderBrowse(); }
function openCard(el)    { el.classList.toggle('open'); }
function bStar(gi, btn)  {
  const on = toggleStar(gi);
  btn.classList.toggle('on', on);
  btn.textContent = on ? '★' : '☆';
  if (flt === 'mine') renderBrowse();
}

/* ═══════════════════════════════
   FLASHCARDS
═══════════════════════════════ */
function buildFlash() {
  const cards = getCards();
  const el = document.getElementById('view-flashcards');
  if (!cards.length) {
    el.innerHTML = flt==='mine'
      ? empty('Your deck is empty.','Star cards in Browse to study them here.')
      : empty('No cards to show.');
    return;
  }
  el.innerHTML = `
    <div class="fc-wrap">
      <div class="fc-meta">
        <span class="fc-ctr" id="fcCtr">—</span>
        <button class="btn btn-ghost" onclick="shuffleFC()">⇄ Shuffle</button>
      </div>
      <div class="c3d" id="fcCard" onclick="flipFC()">
        <div class="c3d-inner">
          <div class="cface front">
            <div class="cterm" id="fcTerm"></div>
            <div class="chint">tap to flip</div>
          </div>
          <div class="cface back">
            <div class="cdef" id="fcDef"></div>
            <div class="cex"  id="fcEx"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="btn btn-ghost" onclick="fcMove(-1)">← Prev</button>
        <button class="btn btn-ghost" onclick="fcMove(1)">Next →</button>
      </div>
      <button class="btn btn-star" id="fcStar" onclick="fcStar()">
        <span id="fcStarIco">☆</span><span id="fcStarLbl">Add to My Deck</span>
      </button>
    </div>`;
  fc.order = cards.map((_,i) => i);
  fc.idx = 0;
  renderFC();
}

function renderFC() {
  const cards = getCards();
  const card  = cards[fc.order[fc.idx]];
  const gi    = ALL.indexOf(card);
  const on    = myDeck.has(gi);
  document.getElementById('fcTerm').textContent = card.term;
  document.getElementById('fcDef').textContent  = card.definition;
  document.getElementById('fcEx').textContent   = card.example ? `"${card.example}"` : '';
  document.getElementById('fcCtr').textContent  = `${fc.idx+1} / ${cards.length}`;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcStarIco').textContent = on ? '★' : '☆';
  document.getElementById('fcStarLbl').textContent = on ? 'In My Deck' : 'Add to My Deck';
  document.getElementById('fcStar').classList.toggle('on', on);
}

function flipFC()    { document.getElementById('fcCard').classList.toggle('flipped'); }
function fcMove(dir) { const n=getCards().length; fc.idx=(fc.idx+dir+n)%n; renderFC(); }
function shuffleFC() { fc.order=[...fc.order].sort(()=>Math.random()-.5); fc.idx=0; renderFC(); }
function fcStar() {
  const cards = getCards();
  toggleStar(ALL.indexOf(cards[fc.order[fc.idx]]));
  renderFC();
}

/* ═══════════════════════════════
   LEARN
═══════════════════════════════ */
function buildLearn() {
  const cards = getCards();
  const el = document.getElementById('view-learn');
  if (cards.length < 1) {
    el.innerHTML = flt==='mine' ? empty('Your deck is empty.','Star cards in Browse first.') : empty('No cards to study.');
    return;
  }
  el.innerHTML = `
    <div class="prog"><div class="prog-fill" id="lProg" style="width:0%"></div></div>
    <div class="defcard">
      <div class="deflabel">Definition</div>
      <div class="deftext" id="lDef"></div>
      <div class="defex"   id="lEx"></div>
    </div>
    <input class="ainput" id="lInput" placeholder="Type the term…"
           onkeydown="if(event.key==='Enter')checkLearn()">
    <div class="fb" id="lFb"></div>
    <div class="arow">
      <button class="btn btn-ghost" id="lSkip" onclick="nextLearn()">Skip</button>
      <button class="btn btn-pri"   id="lCheck" onclick="checkLearn()">Check</button>
    </div>`;
  lrn.order = [...Array(cards.length).keys()].sort(() => Math.random()-.5);
  lrn.idx = 0; lrn.answers = {}; lrn.locked = false;
  renderLearn();
}

function renderLearn() {
  const cards = getCards();
  if (lrn.idx >= cards.length) { showLearnEnd(cards.length); return; }
  const card = cards[lrn.order[lrn.idx]];
  document.getElementById('lDef').textContent   = card.definition;
  document.getElementById('lEx').textContent    = card.example ? `"${card.example}"` : '';
  document.getElementById('lInput').value       = '';
  document.getElementById('lInput').className   = 'ainput';
  document.getElementById('lFb').textContent    = '';
  document.getElementById('lFb').className      = 'fb';
  document.getElementById('lCheck').textContent = 'Check';
  document.getElementById('lCheck').onclick     = checkLearn;
  document.getElementById('lSkip').style.display = '';
  document.getElementById('lProg').style.width  = (lrn.idx/cards.length*100)+'%';
  lrn.locked = false;
  document.getElementById('lInput').focus();
}

function checkLearn() {
  if (lrn.locked) { nextLearn(); return; }
  const cards = getCards();
  const card  = cards[lrn.order[lrn.idx]];
  const ans   = document.getElementById('lInput').value.trim().toLowerCase();
  const right = card.term.toLowerCase();
  const ok    = ans===right || lev(ans,right) <= (right.length>8?2:1);
  lrn.answers[lrn.idx] = ok; lrn.locked = true;
  document.getElementById('lInput').className = 'ainput ' + (ok?'ok':'bad');
  const fb = document.getElementById('lFb');
  fb.className = 'fb ' + (ok?'ok':'bad');
  fb.innerHTML = ok ? '✓ Correct!' : `✗ The answer is <strong>${esc(card.term)}</strong>`;
  document.getElementById('lCheck').textContent = 'Next →';
  document.getElementById('lCheck').onclick     = nextLearn;
  document.getElementById('lSkip').style.display = 'none';
}

function nextLearn() { lrn.idx++; renderLearn(); }

function showLearnEnd(total) {
  const n = Object.values(lrn.answers).filter(Boolean).length;
  document.getElementById('view-learn').innerHTML =
    `<div class="results"><div class="rscore">${n}/${total}</div>
     <div class="rsub">correct answers</div>
     <button class="btn btn-pri" onclick="buildLearn()">Try Again</button></div>`;
}

/* ═══════════════════════════════
   MATCH
═══════════════════════════════ */
function buildMatch() {
  clearInterval(mch.iv);
  const cards = getCards();
  const el = document.getElementById('view-match');
  if (cards.length < 2) {
    el.innerHTML = flt==='mine'
      ? empty('Need at least 2 cards.','Star more cards to play Match.')
      : empty('Need at least 2 cards.');
    return;
  }
  el.innerHTML = `
    <div class="match-top">
      <span class="match-lbl" id="mLbl">Match all pairs</span>
      <span class="match-tmr" id="mTmr">0:00</span>
    </div>
    <div class="match-grid" id="mGrid"></div>
    <div class="ct mt16"><button class="btn btn-ghost" onclick="buildMatch()">New Round</button></div>`;
  startMatch(cards);
}

function startMatch(cards) {
  const pool = [...cards].sort(()=>Math.random()-.5).slice(0,6);
  const terms = pool.map((c,i) => ({ id:i, text:c.term, kind:'T' }));
  const defs  = pool.map((c,i) => ({ id:i, text:c.definition, kind:'D' }));
  mch.tiles = [...terms,...defs].sort(()=>Math.random()-.5);
  mch.sel = null; mch.done = new Set(); mch.secs = 0;
  document.getElementById('mLbl').textContent = `Match all ${pool.length} pairs`;
  renderMatch();
  mch.iv = setInterval(() => {
    mch.secs++;
    const m=Math.floor(mch.secs/60), s=String(mch.secs%60).padStart(2,'0');
    document.getElementById('mTmr').textContent = `${m}:${s}`;
  }, 1000);
}

function renderMatch() {
  document.getElementById('mGrid').innerHTML = mch.tiles.map((t,i) => {
    let cls = 'mtile';
    if (mch.done.has(t.id)) cls += ' done';
    if (mch.sel === i)       cls += ' sel';
    return `<div class="${cls}" data-i="${i}" onclick="pickTile(${i})">${esc(t.text)}</div>`;
  }).join('');
}

function pickTile(i) {
  const t = mch.tiles[i];
  if (mch.done.has(t.id)) return;

  if (mch.sel === null) { mch.sel = i; renderMatch(); return; }
  if (mch.sel === i)    { mch.sel = null; renderMatch(); return; }

  const pi = mch.sel, pt = mch.tiles[pi];
  mch.sel = null;

  if (pt.id === t.id && pt.kind !== t.kind) {
    mch.done.add(t.id);
    renderMatch();
    if (mch.done.size === mch.tiles.length/2) {
      clearInterval(mch.iv);
      document.getElementById('mLbl').textContent =
        `✓ Done in ${document.getElementById('mTmr').textContent}!`;
    }
  } else {
    renderMatch();
    [i, pi].forEach(idx => {
      const el = document.querySelector(`[data-i="${idx}"]`);
      if (!el) return;
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 380);
    });
  }
}

/* ═══════════════════════════════
   QUIZ
═══════════════════════════════ */
function buildQuiz() {
  const cards = getCards();
  const el = document.getElementById('view-quiz');
  if (cards.length < 2) {
    el.innerHTML = flt==='mine'
      ? empty('Need at least 2 cards.','Star more cards to play Quiz.')
      : empty('Need at least 2 cards.');
    return;
  }
  el.innerHTML = `
    <div class="prog"><div class="prog-fill" id="qProg" style="width:0%"></div></div>
    <div class="quiz-q">
      <div class="quiz-qlbl">Choose the correct definition</div>
      <div class="quiz-term" id="qTerm"></div>
    </div>
    <div class="quiz-opts" id="qOpts"></div>`;
  qz.order = [...Array(cards.length).keys()].sort(()=>Math.random()-.5);
  qz.idx = 0; qz.answers = {}; qz.locked = false;
  renderQuiz();
}

function renderQuiz() {
  const cards = getCards();
  if (qz.idx >= cards.length) { showQuizEnd(cards.length); return; }
  const card = cards[qz.order[qz.idx]];
  document.getElementById('qTerm').textContent  = card.term;
  document.getElementById('qProg').style.width  = (qz.idx/cards.length*100)+'%';
  const correct = card.definition;
  const opts    = [correct, ...cards.filter(c=>c!==card).sort(()=>Math.random()-.5).slice(0,3).map(c=>c.definition)]
                    .sort(()=>Math.random()-.5);
  document.getElementById('qOpts').innerHTML = opts.map(opt =>
    `<button class="qopt" onclick="pickOpt(this,${opt===correct})">${esc(opt)}</button>`
  ).join('');
  qz.locked = false;
}

function pickOpt(btn, ok) {
  if (qz.locked) return;
  qz.locked = true; qz.answers[qz.idx] = ok;
  document.querySelectorAll('.qopt').forEach(b => b.classList.add('locked'));
  btn.classList.add(ok ? 'correct' : 'wrong');
  if (!ok) {
    const correct = getCards()[qz.order[qz.idx]].definition;
    document.querySelectorAll('.qopt').forEach(b => { if(b.textContent===correct) b.classList.add('correct'); });
  }
  setTimeout(() => { qz.idx++; renderQuiz(); }, 1200);
}

function showQuizEnd(total) {
  const n = Object.values(qz.answers).filter(Boolean).length;
  document.getElementById('view-quiz').innerHTML =
    `<div class="results"><div class="rscore">${n}/${total}</div>
     <div class="rsub">correct answers</div>
     <button class="btn btn-pri" onclick="buildQuiz()">Try Again</button></div>`;
}

/* ═══════════════════════════════
   KEYBOARD (flashcards)
═══════════════════════════════ */
document.addEventListener('keydown', e => {
  if (mode !== 'flashcards') return;
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); fcMove(1); }
  if (e.key==='ArrowLeft')               { e.preventDefault(); fcMove(-1); }
  if (e.key==='Enter')                   flipFC();
});
